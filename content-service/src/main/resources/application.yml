#        dashboard: localhost:8080
#      filter:
#        enabled: false
    stream:
      rocketmq:
        binder:
          name-server: 124.223.32.169:9876
        bindings:
          output:
            producer:
              producerType: Trans                      # ① 必须加这一行，声明为事务消息类型
