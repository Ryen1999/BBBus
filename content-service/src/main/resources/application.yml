# Feign 客户端 Sentinel 熔断降级配置
# 用于在微服务调用失败、超时或限流时提供降级处理，增强系统容错能力
feign:
  sentinel:
    # 启用 Feign 客户端的 Sentinel 支持
    # 开启后，Feign 调用会被 Sentinel 监控和保护，支持熔断、限流、降级等功能
    enabled: true
    # 允许 Feign 接口返回 Future 类型（如 CompletableFuture）
    # 当 Feign 接口方法返回异步类型时，需要开启此配置才能正常使用 Sentinel 保护
    allow-future-bean: true

# RocketMQ 配置
rocketmq:
  #RocketMQ NameServer 地址
  name-server: 124.223.32.169:9876
  producer:
    #生产者组名称，设置为服务名
    group: content-service-producer
    #消息发送超时时间，3 秒
    send-message-timeout: 10000
    #发送失败时的重试次数
    retry-times-when-send-failed: 2
    #异步发送失败时的重试次数
    retry-times-when-send-async-failed: 2
