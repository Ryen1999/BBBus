spring:
  application:
    # 服务名称
    name: content-service
  # 数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://bbbus.cloud:3306/content_center?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 15151112063Gw
    # HikariCP 连接池配置
    hikari:
      # 连接最大生命周期（毫秒），设置为 15 分钟，比 MySQL wait_timeout 短
      max-lifetime: 900000
      # 连接空闲超时时间（毫秒）
      idle-timeout: 600000
      # 连接测试查询超时时间（毫秒）
      connection-timeout: 30000
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
  # nacos注册中心
  cloud:
    nacos:
      discovery:
        server-addr: 47.122.87.219:8848
        namespace: 7e1f4523-af8b-48ab-9ec2-368a30db92ee # nacos命名空间
        group: DEFAULT_GROUP  # nacos命名空间id
        cluster-name: NJ      # nacos集群名称
