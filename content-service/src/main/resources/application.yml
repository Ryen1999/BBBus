#server:
#  port: 8081
spring:
  application:
    # 服务名称
    name: content-service
  servlet:
    multipart:
      max-file-size: 500MB      # 单文件最大 500MB
      max-request-size: 500MB   # 整个请求最大 500MB
  sleuth:
    sampler:
      probability: 1.0   # 采样率 1.0=100%（开发环境全采，生产建议 0.1）
  zipkin:
    base-url: http://127.0.0.1:9411   # Zipkin Server 地址
    sender:
      type: web   # 用 HTTP 上报（简单），生产可改 kafka
  # Elasticsearch 连接配置（对应本地 E:\GoogleDownload\elasticsearch-7.17.28，默认端口 9200）
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s    # 连接超时 5 秒
    socket-timeout: 30s       # 读写超时 30 秒（全量同步时写入较慢）
  # nacos注册中心
  cloud:
    nacos:
      discovery:
        server-addr: 47.122.87.219:8848
        namespace: 7e1f4523-af8b-48ab-9ec2-368a30db92ee # nacos命名空间
        group: DEFAULT_GROUP  # nacos命名空间id
        cluster-name: NJ      # nacos集群名称
    #sentinel控制台
#    sentinel:
#      transport:
#        port: 8719
#        dashboard: localhost:8080
#      filter:
#        enabled: false
    stream:
      rocketmq:
        binder:
          name-server: 124.223.32.169:9876
        bindings:
          output:
            producer:
              producerType: Trans                      # ① 必须加这一行，声明为事务消息类型
              group: tx-add-bonus-group
              transactionListener: addBonusStreamListener  # ② Bean 名字，对应 @Component 的值
      bindings:
        output:
          destination: add-bonus-topic   # 对应 RocketMQ 的 topic

# mybatis 扫描配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.userservice.dto

# MyBatis SQL 日志输出配置
logging:
  level:
    com.bbbus.contentservice.dao.content: DEBUG


stock:
  service:
    url: http://124.223.32.169:8100


# Feign 客户端 Sentinel 熔断降级配置
# 用于在微服务调用失败、超时或限流时提供降级处理，增强系统容错能力
feign:
  sentinel:
    # 启用 Feign 客户端的 Sentinel 支持
    # 开启后，Feign 调用会被 Sentinel 监控和保护，支持熔断、限流、降级等功能
    enabled: true
    # 允许 Feign 接口返回 Future 类型（如 CompletableFuture）
    # 当 Feign 接口方法返回异步类型时，需要开启此配置才能正常使用 Sentinel 保护
    allow-future-bean: true

